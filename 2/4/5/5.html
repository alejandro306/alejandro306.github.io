<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Día de la Novia - 3D Interactivo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #050206;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
            user-select: none;
            cursor: grab;
        }

        body:active {
            cursor: grabbing;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .overlay-ui {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 30px 25px;
        }

        .title-container {
            width: 100%;
            text-align: center;
            pointer-events: none;
            margin-top: 5px;
        }

        h1 {
            font-family: 'Courier New', Courier, monospace;
            font-size: 2.8rem;
            font-weight: 700;
            color: #ff2d55;
            text-transform: lowercase;
            letter-spacing: 3px;
            text-shadow: 
                0 0 7px rgba(255, 45, 85, 0.9),
                0 0 15px rgba(255, 45, 85, 0.6),
                0 0 30px rgba(255, 45, 85, 0.4),
                0 0 60px rgba(255, 45, 85, 0.2);
            animation: neonPulse 2s ease-in-out infinite alternate;
        }

        @keyframes neonPulse {
            0% {
                text-shadow: 
                    0 0 7px rgba(255, 45, 85, 0.9),
                    0 0 15px rgba(255, 45, 85, 0.6),
                    0 0 30px rgba(255, 45, 85, 0.4);
            }
            100% {
                text-shadow: 
                    0 0 10px rgba(255, 45, 85, 1),
                    0 0 25px rgba(255, 45, 85, 0.8),
                    0 0 50px rgba(255, 45, 85, 0.6),
                    0 0 80px rgba(255, 45, 85, 0.3);
            }
        }

        .btn-group {
            position: fixed;
            top: 30px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 25px;
            z-index: 20;
            pointer-events: none;
        }

        .btn-group .btn {
            pointer-events: auto;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255, 45, 85, 0.08);
            border: 2px solid rgba(255, 45, 85, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 45, 85, 0.15);
            backdrop-filter: blur(4px);
        }

        .btn-group .btn:hover {
            background: rgba(255, 45, 85, 0.2);
            border-color: #ff2d55;
            box-shadow: 0 0 25px rgba(255, 45, 85, 0.4);
            transform: scale(1.08);
        }

        .btn-group .btn svg {
            width: 22px;
            height: 22px;
            fill: #ff2d55;
            stroke: #ff2d55;
            stroke-width: 2;
            transition: all 0.3s ease;
        }

        .btn-group .btn:hover svg {
            fill: #ff6b8a;
            stroke: #ff6b8a;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
                letter-spacing: 2px;
            }
            .btn-group .btn {
                width: 40px;
                height: 40px;
            }
            .btn-group .btn svg {
                width: 18px;
                height: 18px;
            }
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="overlay-ui">
        <div class="title-container">
            <h1>feliz dia de la novia</h1>
        </div>
    </div>

    <div class="btn-group">
        <div class="btn" id="btnFullscreen" onclick="toggleFullscreen()">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
            </svg>
        </div>
        <div class="btn" id="btnAudio" onclick="toggleAudio()">
            <svg viewBox="0 0 24 24">
                <rect x="1" y="1" width="22" height="22" rx="2" stroke="currentColor" stroke-width="2" fill="none"/>
                <path d="M8 6l8 6-8 6V6z" fill="currentColor"/>
            </svg>
        </div>
    </div>

    <audio id="bgAudio" loop preload="auto">
        <source src="music/Daniel, Me Estás Matando - Es Verdad (Video Oficial).mp3" type="audio/mpeg">
    </audio>

    <script>
        // ============================================================
        // 1. CONFIGURACIÓN DE LA ESCENA
        // ============================================================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050206);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(0, 0, 22);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.minDistance = 8;
        controls.maxDistance = 40;
        controls.target.set(0, 0, 0);

        // ============================================================
        // 2. LUCES
        // ============================================================
        const ambientLight = new THREE.AmbientLight(0x222244, 0.6);
        scene.add(ambientLight);

        const mainLight = new THREE.DirectionalLight(0xff4488, 1.5);
        mainLight.position.set(5, 10, 7);
        scene.add(mainLight);

        const centerLight = new THREE.PointLight(0xff0055, 2, 30);
        centerLight.position.set(0, 0, 3);
        scene.add(centerLight);

        // ============================================================
        // 3. FONDO DE PARTÍCULAS (Estrellas)
        // ============================================================
        const starsCount = 300;
        const starGeometry = new THREE.BufferGeometry();
        const starPos = new Float32Array(starsCount * 3);
        const starColors = new Float32Array(starsCount * 3);
        const starSpeeds = [];

        const baseStarColor = new THREE.Color(0xff2d55);

        for (let i = 0; i < starsCount; i++) {
            starPos[i * 3] = (Math.random() - 0.5) * 60;
            starPos[i * 3 + 1] = (Math.random() - 0.5) * 60;
            starPos[i * 3 + 2] = (Math.random() - 0.5) * 40 - 10;
            
            starColors[i * 3] = baseStarColor.r;
            starColors[i * 3 + 1] = baseStarColor.g;
            starColors[i * 3 + 2] = baseStarColor.b;

            starSpeeds.push({
                x: (Math.random() - 0.5) * 0.005,
                y: 0.01 + Math.random() * 0.02,
                z: (Math.random() - 0.5) * 0.005
            });
        }

        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        starGeometry.setAttribute('color', new THREE.BufferAttribute(starColors, 3));

        const starMaterial = new THREE.PointsMaterial({
            size: 0.18,
            vertexColors: true,
            transparent: true,
            opacity: 0.7,
            blending: THREE.AdditiveBlending,
            sizeAttenuation: true
        });

        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);

        // ============================================================
        // 4. CORAZÓN TRIDIMENSIONAL CON TEXTO DE AMOR DENTRO
        // ============================================================
        function createHeartShape() {
            const shape = new THREE.Shape();
            shape.moveTo(0, 1.2);
            shape.bezierCurveTo(0, 1.5, 1.5, 3.5, 3.5, 3.5);
            shape.bezierCurveTo(6, 3.5, 6, 0.5, 6, 0.5);
            shape.bezierCurveTo(6, -2, 3, -5, 0, -7.5);
            shape.bezierCurveTo(-3, -5, -6, -2, -6, 0.5);
            shape.bezierCurveTo(-6, 0.5, -6, 3.5, -3.5, 3.5);
            shape.bezierCurveTo(-1.5, 3.5, 0, 1.2, 0, 1.2);
            return shape;
        }

        const heartShape = createHeartShape();
        const extrudeSettings = {
            depth: 1.2,
            bevelEnabled: true,
            bevelSegments: 8,
            steps: 3,
            bevelSize: 0.25,
            bevelThickness: 0.25
        };

        const heartGeo = new THREE.ExtrudeGeometry(heartShape, extrudeSettings);
        heartGeo.center();

        const heartMat = new THREE.MeshPhysicalMaterial({
            color: 0xcc1133,
            metalness: 0.1,
            roughness: 0.3,
            clearcoat: 0.5,
            emissive: 0x330011,
            emissiveIntensity: 0.4,
            side: THREE.DoubleSide
        });

        const heartMesh = new THREE.Mesh(heartGeo, heartMat);
        heartMesh.scale.set(0.55, 0.55, 0.55);
        scene.add(heartMesh);

        // ===== TEXTO DE AMOR DENTRO DEL CORAZÓN =====
        function createHeartText() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');

            // Fondo transparente
            ctx.fillStyle = 'rgba(0,0,0,0)';
            ctx.fillRect(0, 0, 512, 512);
            
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // Sombra para legibilidad
            ctx.shadowColor = 'rgba(0,0,0,0.95)';
            ctx.shadowBlur = 18;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 2;

            // Primera línea
            ctx.font = 'bold 19px Arial, sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.fillText('Para ti, que haces latir mi', 256, 175);

            // Segunda línea
            ctx.font = 'bold 19px Arial, sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.fillText('corazón de una forma única.', 256, 215);

            // Tercera línea
            ctx.shadowBlur = 15;
            ctx.font = 'bold 18px Arial, sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.fillText('En cada recuerdo y en', 256, 270);

            // Cuarta línea
            ctx.font = 'bold 18px Arial, sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.fillText('cada latido, estás tú.', 256, 310);

            // Corazón decorativo abajo
            ctx.shadowBlur = 0;
            ctx.font = 'bold 28px Arial, sans-serif';
            ctx.fillStyle = '#ff2d55';
            ctx.shadowColor = 'rgba(255,45,85,0.8)';
            ctx.shadowBlur = 20;
            ctx.fillText('❤️', 256, 390);

            const texture = new THREE.CanvasTexture(canvas);
            texture.needsUpdate = true;

            const textMat = new THREE.MeshBasicMaterial({
                map: texture,
                transparent: true,
                depthWrite: false,
                side: THREE.DoubleSide
            });

            const textGeo = new THREE.PlaneGeometry(5.8, 5.8);
            const textMesh = new THREE.Mesh(textGeo, textMat);
            textMesh.position.z = 0.72; // Justo en la superficie del corazón
            return textMesh;
        }

        const heartText = createHeartText();
        heartMesh.add(heartText); // El texto se añade DENTRO del corazón

        // ============================================================
        // 5. NODOS (FOTOS) Y RAÍCES (OPTIMIZADO)
        // ============================================================
        const photoUrls = [
            'img/7.jpg',
            'img/IMG-20250518-WA0009.jpg',
            'img/IMG-20250518-WA0010.jpg',
            'img/IMG-20250518-WA0011.jpg'
        ];

        const nodePositions = [
            new THREE.Vector3(0, 6.5, 0.5),
            new THREE.Vector3(6.5, 0, 0.5),
            new THREE.Vector3(0, -6.5, 0.5),
            new THREE.Vector3(-6.5, 0, 0.5)
        ];

        const textureLoader = new THREE.TextureLoader();
        const nodeMeshes = [];
        const rootMeshes = [];

        nodePositions.forEach((pos, index) => {
            const nodeGroup = new THREE.Group();

            // Fondo del disco
            const discGeo = new THREE.CircleGeometry(1.4, 48);
            const discMat = new THREE.MeshPhysicalMaterial({ color: 0x11111c, roughness: 0.6 });
            const disc = new THREE.Mesh(discGeo, discMat);
            disc.position.copy(pos);
            nodeGroup.add(disc);

            // Borde Neón
            const ringGeo = new THREE.RingGeometry(1.35, 1.42, 48);
            const borderMat = new THREE.MeshPhysicalMaterial({
                color: 0xff2d55,
                emissive: 0xff2d55,
                emissiveIntensity: 0.5,
                side: THREE.DoubleSide
            });
            const border = new THREE.Mesh(ringGeo, borderMat);
            border.position.copy(pos);
            border.position.z += 0.03;
            nodeGroup.add(border);

            // Foto Mapeada
            const imgTexture = textureLoader.load(photoUrls[index]);
            const photoGeo = new THREE.PlaneGeometry(2.1, 2.6);
            const photoMat = new THREE.MeshBasicMaterial({ map: imgTexture, side: THREE.DoubleSide });
            const photo = new THREE.Mesh(photoGeo, photoMat);
            photo.position.copy(pos);
            photo.position.z += 0.01;
            nodeGroup.add(photo);

            scene.add(nodeGroup);

            nodeMeshes.push({
                group: nodeGroup,
                basePos: pos.clone(),
                borderMat: borderMat
            });

            // ===== RAÍCES =====
            const startPos = new THREE.Vector3(0, 0, 0);
            const endPos = pos.clone();
            
            const mid1 = new THREE.Vector3(
                endPos.x * 0.3 + (Math.random() - 0.5) * 1.2,
                endPos.y * 0.3 + (Math.random() - 0.5) * 1.2,
                (Math.random() - 0.5) * 1.5
            );
            const mid2 = new THREE.Vector3(
                endPos.x * 0.7 + (Math.random() - 0.5) * 1.0,
                endPos.y * 0.7 + (Math.random() - 0.5) * 1.0,
                (Math.random() - 0.5) * 0.8
            );

            const curve = new THREE.CubicBezierCurve3(startPos, mid1, mid2, endPos);
            const curvePoints = curve.getPoints(40);
            
            // Líneas con grosor simulado
            const thickPoints = [];
            const segments = curvePoints.length;
            
            for (let i = 0; i < segments - 1; i++) {
                const p1 = curvePoints[i];
                const p2 = curvePoints[i + 1];
                
                const dir = new THREE.Vector3().subVectors(p2, p1).normalize();
                const perp = new THREE.Vector3(-dir.y, dir.x, 0).normalize();
                const thickness = 0.08;
                
                const p1a = p1.clone().add(perp.clone().multiplyScalar(thickness));
                const p1b = p1.clone().add(perp.clone().multiplyScalar(-thickness));
                const p2a = p2.clone().add(perp.clone().multiplyScalar(thickness));
                const p2b = p2.clone().add(perp.clone().multiplyScalar(-thickness));
                
                thickPoints.push(p1a, p2a, p1b, p2b);
            }
            
            const rootGeo = new THREE.BufferGeometry();
            const positions = new Float32Array(thickPoints.length * 3);
            thickPoints.forEach((p, i) => {
                positions[i * 3] = p.x;
                positions[i * 3 + 1] = p.y;
                positions[i * 3 + 2] = p.z;
            });
            rootGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            const rootMat = new THREE.LineBasicMaterial({
                color: 0xcc1133,
                transparent: true,
                opacity: 0.85,
                linewidth: 3
            });
            
            const rootLine = new THREE.LineSegments(rootGeo, rootMat);
            scene.add(rootLine);

            rootMeshes.push({
                mesh: rootLine,
                mat: rootMat,
                originalPoints: curvePoints.map(p => p.clone()),
                thickPoints: thickPoints
            });
        });

        // ============================================================
        // 6. SISTEMA DE CONTROL DE FASES
        // ============================================================
        let animState = {
            active: false,
            phase: 1,
            progress: 0
        };

        const PHASE1_DURATION = 0.5;
        const PHASE2_DURATION = 1.6;
        const CYCLE_INTERVAL = 6.0;
        let cycleTimer = 0;

        function getAuraColor(time, offset = 0) {
            const hue = (time * 1.5 + offset) % 1.0;
            return new THREE.Color().setHSL(hue, 1.0, 0.55);
        }

        function triggerAnimation() {
            if (animState.active) return;
            animState.active = true;
            animState.phase = 1;
            animState.progress = 0;
            cycleTimer = 0;
        }

        renderer.domElement.addEventListener('click', (e) => {
            if (e.target.closest('.btn')) return;
            triggerAnimation();
        });

        // ============================================================
        // 7. CONTROL DE INTERFAZ
        // ============================================================
        let isAudioPlaying = false;
        const audio = document.getElementById('bgAudio');

        function toggleAudio() {
            if (isAudioPlaying) {
                audio.pause();
                isAudioPlaying = false;
            } else {
                audio.play().catch(() => {});
                isAudioPlaying = true;
            }
            updateAudioButton();
        }

        function updateAudioButton() {
            const btn = document.getElementById('btnAudio');
            const svg = btn.querySelector('svg');
            if (isAudioPlaying) {
                svg.innerHTML = `
                    <rect x="1" y="1" width="22" height="22" rx="2" stroke="currentColor" stroke-width="2" fill="none"/>
                    <rect x="6" y="5" width="3" height="14" fill="currentColor"/>
                    <rect x="11" y="5" width="3" height="14" fill="currentColor"/>
                    <rect x="16" y="5" width="3" height="14" fill="currentColor"/>
                `;
            } else {
                svg.innerHTML = `
                    <rect x="1" y="1" width="22" height="22" rx="2" stroke="currentColor" stroke-width="2" fill="none"/>
                    <path d="M8 6l8 6-8 6V6z" fill="currentColor"/>
                `;
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen().catch(() => {});
            }
        }

        // ============================================================
        // 8. FUNCIÓN PARA ACTUALIZAR RAÍCES (OPTIMIZADA)
        // ============================================================
        function updateRoots(offsetAmount = 0, color = null, opacity = null) {
            rootMeshes.forEach((root, idx) => {
                const origPoints = root.originalPoints;
                const newPoints = origPoints.map((p, i) => {
                    if (i === 0 || i === origPoints.length - 1) return p.clone();
                    const noise = Math.sin(performance.now() * 0.002 + i * 0.3 + idx) * offsetAmount;
                    return new THREE.Vector3(
                        p.x + noise,
                        p.y + noise,
                        p.z + noise * 0.5
                    );
                });

                const thickPoints = [];
                const segments = newPoints.length;
                
                for (let i = 0; i < segments - 1; i++) {
                    const p1 = newPoints[i];
                    const p2 = newPoints[i + 1];
                    
                    const dir = new THREE.Vector3().subVectors(p2, p1).normalize();
                    const perp = new THREE.Vector3(-dir.y, dir.x, 0).normalize();
                    const thickness = 0.08 + offsetAmount * 0.02;
                    
                    const p1a = p1.clone().add(perp.clone().multiplyScalar(thickness));
                    const p1b = p1.clone().add(perp.clone().multiplyScalar(-thickness));
                    const p2a = p2.clone().add(perp.clone().multiplyScalar(thickness));
                    const p2b = p2.clone().add(perp.clone().multiplyScalar(-thickness));
                    
                    thickPoints.push(p1a, p2a, p1b, p2b);
                }
                
                const posAttr = root.mesh.geometry.attributes.position;
                const array = posAttr.array;
                thickPoints.forEach((p, i) => {
                    array[i * 3] = p.x;
                    array[i * 3 + 1] = p.y;
                    array[i * 3 + 2] = p.z;
                });
                posAttr.needsUpdate = true;
                
                if (color) {
                    root.mat.color.copy(color);
                }
                if (opacity !== null) {
                    root.mat.opacity = opacity;
                }
            });
        }

        // ============================================================
        // 9. BUCLE DE RENDERIZADO
        // ============================================================
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.05);
            const elapsed = clock.getElapsedTime();

            // ===== ANIMACIÓN PASIVA DE LAS ESTRELLAS =====
            const starPosAttr = starGeometry.attributes.position;
            const starColorAttr = starGeometry.attributes.color;
            for (let i = 0; i < starsCount; i++) {
                starPosAttr.array[i * 3 + 1] += starSpeeds[i].y * delta * 50;
                if (starPosAttr.array[i * 3 + 1] > 30) {
                    starPosAttr.array[i * 3 + 1] = -30;
                }
            }
            starPosAttr.needsUpdate = true;

            // ===== ESTADO REPOSO =====
            if (!animState.active) {
                const idlePulse = 1.0 + Math.sin(elapsed * 3.0) * 0.02;
                heartMesh.scale.set(0.55 * idlePulse, 0.55 * idlePulse, 0.55 * idlePulse);
                heartMat.color.setHex(0xcc1133);
                heartMat.emissive.setHex(0x330011);
                heartMat.emissiveIntensity = 0.4;
                centerLight.color.setHex(0xff0055);
                centerLight.intensity = 2.0;

                nodeMeshes.forEach((node, i) => {
                    const waveY = Math.sin(elapsed * 1.5 + i * 2.0) * 0.15;
                    node.group.position.y = waveY;
                    node.borderMat.color.setHex(0xff2d55);
                    node.borderMat.emissive.setHex(0xff2d55);
                    node.borderMat.emissiveIntensity = 0.5;
                });

                updateRoots(0.03, new THREE.Color(0xcc1133), 0.85);

                for (let i = 0; i < starsCount; i++) {
                    starColorAttr.array[i * 3] = baseStarColor.r;
                    starColorAttr.array[i * 3 + 1] = baseStarColor.g;
                    starColorAttr.array[i * 3 + 2] = baseStarColor.b;
                }
                starColorAttr.needsUpdate = true;

                cycleTimer += delta;
                if (cycleTimer > CYCLE_INTERVAL) triggerAnimation();
            }

            // ===== ANIMACIÓN DE DOS FASES =====
            if (animState.active) {
                animState.progress += delta;

                if (animState.phase === 1) {
                    const p = Math.min(animState.progress / PHASE1_DURATION, 1.0);
                    
                    const jitterAmount = 0.3 * (1 + p);
                    updateRoots(jitterAmount, new THREE.Color(1, 0.85, 0.1), 0.95);

                    nodeMeshes.forEach(n => {
                        n.borderMat.color.setRGB(1.0, 0.8, 0.0);
                        n.borderMat.emissiveIntensity = 1.2;
                    });

                    heartMat.emissive.setRGB(0.8, 0.5, 0.0);
                    heartMat.emissiveIntensity = p * 3.5;
                    centerLight.color.setRGB(1.0, 0.7, 0.1);
                    centerLight.intensity = 3.0 + p * 15.0;

                    if (p >= 1.0) {
                        animState.phase = 2;
                        animState.progress = 0;
                    }

                } else if (animState.phase === 2) {
                    const p = Math.min(animState.progress / PHASE2_DURATION, 1.0);
                    const wave = Math.sin(p * Math.PI);

                    const burstScale = 1.0 + wave * 0.32;
                    heartMesh.scale.set(0.55 * burstScale, 0.55 * burstScale, 0.55 * burstScale);

                    const currentAura = getAuraColor(elapsed, 0);

                    heartMat.color.copy(currentAura);
                    heartMat.emissive.copy(currentAura);
                    heartMat.emissiveIntensity = 2.5 * (1.0 - p);
                    centerLight.color.copy(currentAura);
                    centerLight.intensity = 25.0 * (1.0 - p);

                    const smoothBack = 0.02 * (1.0 - p);
                    updateRoots(smoothBack, currentAura, 0.9 * (1.0 - p * 0.8));

                    nodeMeshes.forEach((node) => {
                        node.borderMat.color.copy(currentAura);
                        node.borderMat.emissive.copy(currentAura);
                        node.borderMat.emissiveIntensity = 0.4 + wave * 1.5;
                    });

                    for (let i = 0; i < starsCount; i++) {
                        starColorAttr.array[i * 3] = THREE.MathUtils.lerp(baseStarColor.r, currentAura.r, wave);
                        starColorAttr.array[i * 3 + 1] = THREE.MathUtils.lerp(baseStarColor.g, currentAura.g, wave);
                        starColorAttr.array[i * 3 + 2] = THREE.MathUtils.lerp(baseStarColor.b, currentAura.b, wave);
                    }
                    starColorAttr.needsUpdate = true;

                    if (p >= 1.0) {
                        animState.active = false;
                        updateRoots(0, new THREE.Color(0xcc1133), 0.85);
                    }
                }
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // ============================================================
        // 10. AJUSTE DE PANTALLA
        // ============================================================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ============================================================
        // 11. INICIALIZACIÓN
        // ============================================================
        animate();

        document.addEventListener('click', () => {
            if (!isAudioPlaying) {
                audio.play().catch(() => {});
                isAudioPlaying = true;
                updateAudioButton();
            }
        }, { once: true });
    </script>
</body>
</html>
