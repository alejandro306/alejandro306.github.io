    <link href="¡Feliz Aniversario, Mi Amor!_files/css2" rel="stylesheet">    <link rel="stylesheet" href="¡Feliz Aniversario, Mi Amor!_files/all.min.css">            <link rel="stylesheet" href="¡Feliz Aniversario, Mi Amor!_files/hombre.css">

</head>
<body>
        <audio id="backgroundMusic" loop="" preload="auto" volume="90">
        <source src="musica/Río Roma - Mi Persona Favorita.mp3" type="audio/mpeg">
        Tu navegador no soporta el elemento de audio.
    </audio>
    
    <div class="parallax-bg"></div>
    <div class="overlay"></div>
        <div class="heart-glow"></div>
        <div class="title"> 
        <h1>¡Feliz Aniversario, Mi Amor!</h1>
    </div>
    <div class="container">
        <div class="main-content">
            <div class="image-container">
                <img src="img/OIP.jpeg" alt="Cover Image" class="cover-image">
            </div>
            <div class="password-section">
                <p class="password-hint">Ingresa la contraseña</p>
                <p class="hint">Pista: El dia que nos dimos otra oportunidad</p>
                <p class="hint">dd/mm/aaaa</p>
                <div class="password-display" id="password-display"></div>
                <div class="error" id="error">Contraseña incorrecta, intenta de nuevo.</div>
                <div class="keyboard" role="region" aria-label="Teclado numérico">
                    <button class="key" onclick="addDigit(&#39;1&#39;)">1</button>
                    <button class="key" onclick="addDigit(&#39;2&#39;)">2</button>
                    <button class="key" onclick="addDigit(&#39;3&#39;)">3</button>
                    <button class="key" onclick="addDigit(&#39;4&#39;)">4</button>
                    <button class="key" onclick="addDigit(&#39;5&#39;)">5</button>
                    <button class="key" onclick="addDigit(&#39;6&#39;)">6</button>
                    <button class="key" onclick="addDigit(&#39;7&#39;)">7</button>
                    <button class="key" onclick="addDigit(&#39;8&#39;)">8</button>
                    <button class="key" onclick="addDigit(&#39;9&#39;)">9</button>
                    <button class="key delete-key" onclick="deleteDigit()">⌫</button>
                    <button class="key" onclick="addDigit(&#39;0&#39;)">0</button>
                    <button class="key" onclick="addDigit(&#39;*&#39;)">#</button>
                    <button class="key enter-key" onclick="checkPassword()">Entrar</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        console.log('Attempting to load CSS file: /hombre.css');
        
        let password = '';
        const passwordDisplay = document.getElementById('password-display');

        function addDigit(digit) {
            password += digit;
            updateDisplay();
            animateKey(digit);
        }

        function deleteDigit() {
            password = password.slice(0, -1);
            updateDisplay();
        }

        function updateDisplay() {
            passwordDisplay.textContent = '♥'.repeat(password.length);
        }

        function checkPassword() {
            const error = document.getElementById('error');
            if (password === '2404202') {
                console.log('Password correct, redirecting to celebration.php');
                window.location.href = '2/2.html';
            } else {
                error.style.display = 'block';
                password = '';
                updateDisplay();
                setTimeout(() => error.style.display = 'none', 2000);
            }
        }

        function animateKey(key) {
            const buttons = document.querySelectorAll('.key');
            buttons.forEach(button => {
                if (button.textContent === key) {
                    button.style.transform = 'scale(0.95)';
                    setTimeout(() => button.style.transform = 'scale(1)', 100);
                }
            });
        }
    </script>
    </body>
</html>
